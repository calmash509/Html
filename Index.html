<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Browser | v3 Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #7c3aed; --bg: #06060b; --accent: #2dd4bf; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; margin: 0; }
        
        /* THE CYBER GRID */
        .cyber-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(rgba(124, 58, 237, 0.1) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(124, 58, 237, 0.1) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
        }
        @keyframes grid-move { 
            from { transform: perspective(500px) rotateX(60deg) translateY(0); } 
            to { transform: perspective(500px) rotateX(60deg) translateY(40px); } 
        }

        .glass { 
            background: rgba(13, 13, 23, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(124, 58, 237, 0.3); 
            box-shadow: 0 0 30px rgba(0,0,0,0.6); 
        }

        .neon-text { 
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon); 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 2px;
        }
        
        .search-input { 
            background: rgba(0, 0, 0, 0.7); 
            border: 1px solid rgba(124, 58, 237, 0.5); 
            color: white; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .search-input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 20px var(--neon); 
            outline: none; 
            transform: scale(1.01);
        }

        #auth-overlay { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            z-index: 1000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.8s ease; 
        }
        
        #particles { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        .btn-quantum {
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        .btn-quantum::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }
        .btn-quantum:hover::after { left: 120%; }

        iframe { background: white; border-radius: 12px; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>
    <div class="cyber-grid"></div>

    <div id="auth-overlay">
        <div class="glass p-12 rounded-3xl w-full max-w-md text-center border-t-4 border-t-purple-600 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent"></div>
            <h1 id="auth-title" class="neon-text text-3xl mb-10">QUANTUM LOGIN</h1>
            
            <div class="space-y-5">
                <div class="text-left">
                    <label class="text-[10px] text-purple-400 ml-2 mb-1 block uppercase">Operator ID</label>
                    <input type="text" id="user" placeholder="Username..." class="search-input w-full p-4 rounded-xl">
                </div>
                <div class="text-left">
                    <label class="text-[10px] text-purple-400 ml-2 mb-1 block uppercase">Security Key</label>
                    <input type="password" id="pass" placeholder="••••••••" class="search-input w-full p-4 rounded-xl">
                </div>
                
                <div id="reg-fields" class="hidden text-left">
                    <label class="text-[10px] text-purple-400 ml-2 mb-1 block uppercase">System License</label>
                    <input type="text" id="license" placeholder="XXXX-XXXX-XXXX" class="search-input w-full p-4 rounded-xl">
                </div>

                <button id="main-btn" onclick="handleAuth()" class="btn-quantum w-full bg-purple-600 hover:bg-purple-500 p-5 rounded-xl font-bold transition-all shadow-xl hover:shadow-purple-500/50 uppercase tracking-widest mt-4">Initialize Link</button>
                
                <div class="pt-4 border-t border-purple-500/20 mt-4">
                    <button id="toggle-btn" onclick="toggleAuthMode()" class="text-[10px] text-purple-400 hover:text-white transition-colors uppercase tracking-widest">New Operator? Register Unit</button>
                </div>
                
                <p id="err" class="text-red-500 text-[10px] mt-4 hidden animate-pulse uppercase tracking-widest font-bold">Access Denied: Invalid Core</p>
            </div>
        </div>
    </div>

    <div class="h-screen flex flex-col p-6 space-y-6">
        <header class="glass p-5 rounded-2xl flex items-center justify-between border-b border-purple-500/20">
            <div class="flex items-center space-x-6">
                <div class="relative">
                    <div class="w-4 h-4 rounded-full bg-red-500 animate-pulse"></div>
                    <div class="absolute inset-0 w-4 h-4 rounded-full bg-red-500 blur-md opacity-50"></div>
                </div>
                <h2 class="neon-text text-xl tracking-tighter">QUANTUM // CORE</h2>
            </div>
            
            <div class="flex-1 max-w-5xl mx-16">
                <div class="relative">
                    <input type="text" id="url-input" placeholder="Search the void or enter destination..." class="search-input w-full py-3 px-8 rounded-full text-sm">
                </div>
            </div>

            <div class="flex items-center space-x-8 text-2xl">
                <button onclick="reload()" class="hover:text-purple-400 transition-transform hover:rotate-180 duration-500">↻</button>
                <button onclick="location.reload()" class="text-red-500 hover:text-red-400">⏻</button>
            </div>
        </header>

        <div class="flex-1 glass rounded-[2.5rem] overflow-hidden relative p-1">
            <iframe id="viewport" src="about:blank" class="w-full h-full border-none shadow-inner opacity-0"></iframe>
            
            <div id="home-screen" class="absolute inset-0 bg-[#06060b] flex flex-col items-center justify-center">
                <div class="text-center">
                    <div class="mb-12 relative">
                        <h1 class="neon-text text-6xl mb-2">SYSTEM READY</h1>
                        <div class="h-1 w-48 bg-gradient-to-r from-transparent via-purple-600 to-transparent mx-auto"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-6 max-w-2xl mx-auto">
                        <button onclick="quickLoad('google.com')" class="glass p-6 rounded-2xl hover:border-purple-500 hover:bg-purple-900/20 transition-all group">
                            <span class="block text-xl mb-1 group-hover:scale-110 transition-transform">G</span>
                            <span class="text-[10px] uppercase text-purple-400">Google</span>
                        </button>
                        <button onclick="quickLoad('discord.com')" class="glass p-6 rounded-2xl hover:border-purple-500 hover:bg-purple-900/20 transition-all group">
                            <span class="block text-xl mb-1 group-hover:scale-110 transition-transform">D</span>
                            <span class="text-[10px] uppercase text-purple-400">Discord</span>
                        </button>
                        <button onclick="quickLoad('youtube.com')" class="glass p-6 rounded-2xl hover:border-purple-500 hover:bg-purple-900/20 transition-all group">
                            <span class="block text-xl mb-1 group-hover:scale-110 transition-transform">Y</span>
                            <span class="text-[10px] uppercase text-purple-400">YouTube</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND = "https://proxy-ijt2.onrender.com";
        let isRegistering = false;

        function toggleAuthMode() {
            isRegistering = !isRegistering;
            document.getElementById('auth-title').innerText = isRegistering ? "UNIT REGISTRATION" : "QUANTUM LOGIN";
            document.getElementById('reg-fields').classList.toggle('hidden');
            document.getElementById('main-btn').innerText = isRegistering ? "Register Core" : "Initialize Link";
            document.getElementById('toggle-btn').innerText = isRegistering ? "Existing Operator? Login" : "New Operator? Register Unit";
        }

        async function handleAuth() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const license = document.getElementById('license').value;
            const endpoint = isRegistering ? "/auth/register" : "/auth/login";
            
            const payload = isRegistering ? { username: user, password: pass, license } : { username: user, password: pass };

            try {
                const res = await fetch(`${BACKEND}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (data.success) {
                    if (isRegistering) {
                        alert("CORE REGISTERED SUCCESSFULLY. PLEASE LOGIN.");
                        toggleAuthMode();
                    } else {
                        document.getElementById('auth-overlay').style.opacity = '0';
                        document.getElementById('auth-overlay').style.transform = 'scale(1.2)';
                        setTimeout(() => {
                            document.getElementById('auth-overlay').remove();
                            bootstrapEngine();
                        }, 600);
                    }
                } else {
                    const errEl = document.getElementById('err');
                    errEl.innerText = data.error || "CRITICAL AUTH FAILURE";
                    errEl.classList.remove('hidden');
                }
            } catch (e) { alert("CONNECTION FAILED: BACKEND OFFLINE"); }
        }

        async function bootstrapEngine() {
            const bundle = document.createElement('script');
            bundle.src = `${BACKEND}/uv/uv.bundle.js`;
            bundle.onload = () => {
                const config = document.createElement('script');
                config.src = `${BACKEND}/uv/uv.config.js`;
                config.onload = async () => {
                    if ('serviceWorker' in navigator) {
                        await navigator.serviceWorker.register(`${BACKEND}/uv/uv.sw.js`, { scope: '/service/' });
                        console.log("QUANTUM ENGINE SYNCED");
                    }
                };
                document.head.appendChild(config);
            };
            document.head.appendChild(bundle);
        }

        const input = document.getElementById('url-input');
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') launch(input.value); });

        function launch(val) {
            if (!val) return;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('viewport').style.opacity = '1';
            let url = val.trim();
            if (!url.includes('.') || url.includes(' ')) {
                url = `https://www.google.com/search?q=${encodeURIComponent(url)}`;
            } else {
                if (!url.startsWith('http')) url = 'https://' + url;
            }
            document.getElementById('viewport').src = `${BACKEND}/service/${btoa(url)}`;
        }

        function quickLoad(s) { input.value = s; launch(s); }
        function reload() { document.getElementById('viewport').contentWindow.location.reload(); }

        // PARTICLE ENGINE
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function initParticles() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<60; i++) pts.push({
                x: Math.random()*canvas.width, 
                y: Math.random()*canvas.height, 
                vx: (Math.random()-0.5)*0.4, 
                vy: (Math.random()-0.5)*0.4,
                size: Math.random()*1.5
            });
        }
        function drawParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(124, 58, 237, 0.4)';
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        initParticles(); drawParticles();
    </script>
</body>
      </html>
